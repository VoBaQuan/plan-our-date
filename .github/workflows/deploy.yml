
name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 4. Build production
      - name: Build
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.email "vobaquan0147@gmail.com"
          git config --global user.name "Quan Vo"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/vobaquan/plan-our-date.git

      - name: Deploy to GitHub Pages
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
