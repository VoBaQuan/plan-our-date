name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Cấp quyền ghi lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh chạy nhiều pipeline cùng lúc
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Cài dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build production
      - name: Build
        run: npm run build

      # 5. Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. Upload thư mục dist lên GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 7. Deploy lên GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4